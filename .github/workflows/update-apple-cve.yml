name: Update Apple CVE data

on:
  schedule:
    # Apple traditionally ships updates ~10:00 Cupertino time; run ~2h after.
    # 19:30 UTC = 12:30 PDT (summer) / 11:30 PST (winter).
    - cron: '30 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-apple-cve
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch new Apple security releases
        run: python3 apple-cve/update.py | tee /tmp/update.log

      - name: Commit and push if there are new releases
        run: |
          if git diff --quiet apple-cve/index.html; then
            echo "Nothing new — no commit."
            exit 0
          fi
          summary=$(sed -n 's/^ADDED: //p' /tmp/update.log | paste -sd ', ' -)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apple-cve/index.html
          git commit -m "apple-cve: add ${summary:-new release data}"
          # Cron workflows in this repo race to push — if one lands between our
          # checkout and push, rebase our commit onto it and retry.
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase
          done
          git push
