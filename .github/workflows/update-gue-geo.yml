name: Update GUE schedule

on:
  schedule:
    # Daily, after the US/EU business day, so classes posted that day are picked
    # up overnight. Odd minute to stay off Nominatim's on-the-hour crowds.
    # (gue.com's CDN intermittently rejects datacenter IPs; the mirror fallback
    # plus the 3-day grace below ride out the bad draws.)
    - cron: '40 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-gue-geo
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Fetch schedule + geocode new locations
        working-directory: gue-course-map
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          python3 update_geo.py | tee /tmp/update.log
          code=${PIPESTATUS[0]}  # the script's own exit code, not tee's
          set -e
          if [ "$code" -ne 3 ]; then
            exit "$code"
          fi
          # Exit 3 = schedule unreachable (WAF bad draw and/or mirror outages).
          # The DB is append-only and self-heals on the next run, so a missed day
          # costs little — only go red once unreachability persists for 3 days.
          last_ok=$(gh run list --workflow update-gue-geo.yml --status success \
                      --limit 1 --json startedAt --jq '.[0].startedAt // empty' || true)
          if [ -n "$last_ok" ] && \
             [ $(( $(date +%s) - $(date -d "$last_ok" +%s) )) -lt 259200 ]; then
            echo "::notice::GUE schedule unreachable this run — treating as transient (last success ${last_ok})."
            exit 0
          fi
          echo "::error::GUE schedule unreachable, and no successful run within 3 days."
          exit 1

      - name: Commit and push if anything changed
        run: |
          if git diff --quiet gue-course-map/; then
            echo "No new locations — no commit."
            exit 0
          fi
          n=$(grep -c '] OK' /tmp/update.log || true)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gue-course-map/schedule.json gue-course-map/geo.js \
                  gue-course-map/geocode_cache.json gue-course-map/reverse_cache.json
          git commit -m "gue-course-map: schedule update (${n:-0} newly located)"
          # Cron workflows in this repo race to push — if one lands between our
          # checkout and push, rebase our commit onto it and retry.
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase
          done
          git push
